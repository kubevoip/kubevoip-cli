name: Test
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --extra dev
      - run: uv run --extra=dev ruff check .
      - run: uv run --extra=dev python -m pytest
      - run: uv run kubevoip --help
      - run: uv run kubevoip --schema-file tests/fixtures/platform-crds.yaml api-resources
      - run: uv run kubevoip --schema-file tests/fixtures/platform-crds.yaml --namespace telephony manifest sipuser --name alice
      - run: uvx --from . kubevoip --help
