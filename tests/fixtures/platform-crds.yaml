apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: callroutes.kubevoip.com
spec:
  group: kubevoip.com
  scope: Namespaced
  names:
    plural: callroutes
    singular: callroute
    kind: CallRoute
    shortNames:
    - callroute
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              gatewayRef: &id001
                type: object
                properties:
                  name: &id002
                    type: string
                    minLength: 1
                required:
                - name
              scopeRef: *id001
              priority:
                type: integer
                minimum: 0
                maximum: 1000000
                default: 1000
              match:
                type: object
                properties:
                  calledNumber:
                    type: string
                    pattern: ^[+0-9.*]+$
                    maxLength: 64
                required:
                - calledNumber
              target:
                type: object
                properties:
                  sipUserRef: *id002
                  asteriskPoolRef: *id002
                  trunkRef: *id002
                  extension:
                    type: string
                    pattern: ^[0-9]+$
                x-kubernetes-validations:
                - rule: '(has(self.sipUserRef) ? 1 : 0) + (has(self.asteriskPoolRef)
                    ? 1 : 0) + (has(self.trunkRef) ? 1 : 0) == 1'
                  message: exactly one route target is required
                - rule: '!has(self.asteriskPoolRef) || has(self.extension)'
                  message: Asterisk pool routes require extension
            required:
            - gatewayRef
            - scopeRef
            - match
            - target
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - spec
