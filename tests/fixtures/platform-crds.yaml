apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: siptrunks.kubevoip.com
spec:
  group: kubevoip.com
  scope: Namespaced
  names:
    plural: siptrunks
    singular: siptrunk
    kind: SIPTrunk
    shortNames:
    - siptrunk
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              gatewayRef: &id002
                type: object
                properties:
                  name: &id001
                    type: string
                    minLength: 1
                required:
                - name
              terminationUri: *id001
              inbound:
                type: object
                properties:
                  allowedSourceCidrs:
                    type: array
                    items:
                      type: string
                  dialPolicyRef: *id002
                x-kubernetes-validations:
                - rule: '!has(self.allowedSourceCidrs) || size(self.allowedSourceCidrs)
                    == 0 || has(self.dialPolicyRef)'
                  message: trusted inbound trunks require inbound.dialPolicyRef
              outbound:
                type: object
                properties:
                  callerIdSecretRef: &id003
                    type: object
                    properties:
                      name: *id001
                      key: *id001
                    required:
                    - name
                    - key
                  authentication:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum:
                        - None
                        - Digest
                        default: None
                      digest:
                        type: object
                        properties:
                          usernameSecretRef: *id003
                          passwordSecretRef: *id003
                          realm:
                            type: string
                            minLength: 1
                            maxLength: 253
                        required:
                        - usernameSecretRef
                        - passwordSecretRef
                    x-kubernetes-validations:
                    - rule: self.mode != 'Digest' || has(self.digest)
                      message: Digest authentication requires digest settings
                    - rule: self.mode != 'Digest' || has(self.digest.realm)
                      message: Digest authentication requires digest.realm
                    - rule: self.mode != 'None' || !has(self.digest)
                      message: digest settings require mode Digest
            required:
            - gatewayRef
            - terminationUri
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - spec
